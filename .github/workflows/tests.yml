name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal test dependency
        run: python -m pip install --upgrade pip requests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  docker-deployment-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate deployment Docker build command
        run: docker buildx build --platform linux/amd64 --provenance=false -t causalbench-causal_analysis:test . --progress=plain
